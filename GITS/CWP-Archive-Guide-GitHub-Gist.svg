<svg xmlns="http://www.w3.org/2000/svg" width="820" height="150" viewBox="0 0 820 150" role="img" aria-labelledby="title desc">
  <title id="title">CWP Archive Generation Guide</title>
  <desc id="desc">Clickable badge linking to a GitHub Gist technical guide for Python and PowerShell scripts used to generate AVEVA Wonderware compatible CWP archives.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>

    <linearGradient id="headerLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="52%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <a href="https://gist.github.com/michele-tn/3f8e5f50e76379908d1e702550ea1b0c" target="_blank">
    <rect x="0" y="0" width="820" height="150" rx="22" fill="url(#background)"/>

    <!-- Subtle decorative shapes kept inside the badge -->
    <circle cx="760" cy="30" r="70" fill="#0ea5e9" opacity="0.045"/>
    <circle cx="790" cy="135" r="95" fill="#22c55e" opacity="0.04"/>
    <circle cx="35" cy="142" r="78" fill="#f59e0b" opacity="0.035"/>

    <!-- Header line with internal margins -->
    <rect x="24" y="12" width="772" height="3" rx="1.5" fill="url(#headerLine)"/>

    <!-- Left terminal block -->
    <g transform="translate(32 38)" filter="url(#softShadow)">
      <rect x="0" y="0" width="218" height="80" rx="14" fill="#020617" stroke="#334155" stroke-width="1.2"/>
      <circle cx="20" cy="19" r="5" fill="#ef4444"/>
      <circle cx="41" cy="19" r="5" fill="#f59e0b"/>
      <circle cx="62" cy="19" r="5" fill="#22c55e"/>

      <text x="20" y="50" font-family="Consolas, Monaco, monospace" font-size="14" fill="#38bdf8">Python</text>
      <text x="78" y="50" font-family="Consolas, Monaco, monospace" font-size="14" fill="#94a3b8">+</text>
      <text x="99" y="50" font-family="Consolas, Monaco, monospace" font-size="14" fill="#facc15">PowerShell</text>
      <text x="20" y="68" font-family="Consolas, Monaco, monospace" font-size="12" fill="#94a3b8">CWP archive scripts</text>
    </g>

    <!-- Text area: strictly limited between x=282 and x=650 -->
    <g transform="translate(282 45)">
      <text x="0" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">
        CWP Archive Guide
      </text>

      <text x="1" y="31" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#dbe4f0">
        Python + PowerShell scripts for AVEVA Wonderware
      </text>

      <text x="1" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#7dd3fc">
        Technical documentation published on GitHub Gist
      </text>
    </g>

    <!-- Right call-to-action block separated from text -->
    <g transform="translate(676 53)" filter="url(#softShadow)">
      <rect x="0" y="0" width="98" height="44" rx="22" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
      <text x="49" y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#f8fafc">
        GIST
      </text>
    </g>
  </a>
</svg>
